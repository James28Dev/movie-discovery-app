name: thanaphat_app_cs
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  carousel_slider: ^5.1.1
  flutter_slidable: ^4.0.3
  dio: ^5.9.1
  youtube_player_flutter: ^9.1.3
  flutter_tts: ^4.2.5
  http_parser: ^4.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/

  fonts:
    - family: Mitr
      fonts:
        - asset: fonts/Mitr-Regular.ttf

    - family: Kanit
      fonts:
        - asset: fonts/Kanit-Regular.ttf